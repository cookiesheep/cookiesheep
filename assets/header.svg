<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <defs>
    <linearGradient id="cosmos" x1="0" y1="0" x2="900" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="30%" stop-color="#0a0a2e"/>
      <stop offset="70%" stop-color="#0d0820"/>
      <stop offset="100%" stop-color="#0f0a1a"/>
    </linearGradient>
    <linearGradient id="neonLine" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#a855f7;#7c3aed" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#a855f7;#7c3aed;#06b6d4" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#a855f7">
        <animate attributeName="stop-color" values="#a855f7;#7c3aed;#06b6d4;#a855f7" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="connGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="neb1" cx="680" cy="100" r="250" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb2" cx="250" cy="320" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="neb3" cx="800" cy="300" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nodeGlow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.4" fill="#7c3aed"/>
    </pattern>
    <clipPath id="clip"><rect width="900" height="380" rx="14"/></clipPath>
  </defs>

  <style>
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    @keyframes twinkle1{0%,100%{opacity:.15}50%{opacity:.7}}
    @keyframes twinkle2{0%,100%{opacity:.1}50%{opacity:.55}}
    @keyframes twinkle3{0%,100%{opacity:.2}50%{opacity:.8}}
    @keyframes nodePulse{0%,100%{opacity:.7;r:inherit}50%{opacity:1}}
    @keyframes nodePulseBig{0%,100%{opacity:.6}50%{opacity:1}}
    @keyframes flow{from{stroke-dashoffset:20}to{stroke-dashoffset:0}}
    @keyframes blink{0%,48%{opacity:1}50%,98%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.9}50%{opacity:.4}}
    @keyframes draw{from{stroke-dashoffset:840}to{stroke-dashoffset:0}}
    .t1{animation:fadeIn 2s ease-in-out .1s both}
    .t2{animation:fadeIn 2.5s ease-in-out .5s both}
    .t3{animation:fadeIn 3s ease-in-out 1s both}
    .t4{animation:fadeIn 2s ease-in-out 1.5s both}
    .t5{animation:fadeIn 2s ease-in-out 2s both}
    .t6{animation:fadeIn 2s ease-in-out 2.5s both}
    .nm{animation:slideUp .8s ease-out .4s both}
    .sub{animation:slideUp .6s ease-out .8s both}
    .tag{animation:slideUp .5s ease-out 1.1s both}
    .tag2{animation:slideUp .5s ease-out 1.3s both}
    .tag3{animation:slideUp .5s ease-out 1.5s both}
    .sep{animation:draw .8s ease-out 1s both;stroke-dasharray:840}
    .cur{animation:blink 1s step-end 2s infinite}
    .st{animation:fadeIn .6s ease-out 2s both}
    .sd{animation:pulse 2.5s ease-in-out infinite}
    .conn{stroke-dasharray:5 5;animation:flow 2s linear infinite}
    .conn2{stroke-dasharray:8 4;animation:flow 3s linear infinite}
    .conn3{stroke-dasharray:3 6;animation:flow 2.5s linear infinite reverse}
  </style>

  <g clip-path="url(#clip)">
    <!-- Deep space background -->
    <rect width="900" height="380" fill="url(#cosmos)"/>
    <rect width="900" height="380" fill="url(#neb1)"/>
    <rect width="900" height="380" fill="url(#neb2)"/>
    <rect width="900" height="380" fill="url(#neb3)"/>
    <rect width="900" height="380" fill="url(#dots)" opacity="0.04"/>

    <!-- Stars -->
    <circle cx="120" cy="30" r="1" fill="#fff" class="t1"/>
    <circle cx="350" cy="55" r="0.8" fill="#fff" class="t2"/>
    <circle cx="480" cy="20" r="1.2" fill="#c4b5fd" class="t3"/>
    <circle cx="50" cy="90" r="0.7" fill="#fff" class="t1"/>
    <circle cx="300" cy="140" r="0.9" fill="#67e8f9" class="t2"/>
    <circle cx="440" cy="100" r="1.1" fill="#fff" class="t3"/>
    <circle cx="150" cy="200" r="0.8" fill="#c4b5fd" class="t1"/>
    <circle cx="380" cy="250" r="1" fill="#fff" class="t2"/>
    <circle cx="490" cy="180" r="0.6" fill="#67e8f9" class="t3"/>
    <circle cx="860" cy="20" r="0.9" fill="#fff" class="t1"/>
    <circle cx="550" cy="290" r="0.7" fill="#c4b5fd" class="t2"/>
    <circle cx="200" cy="310" r="1" fill="#fff" class="t3"/>
    <circle cx="420" cy="340" r="0.8" fill="#67e8f9" class="t1"/>
    <circle cx="90" cy="160" r="0.6" fill="#fff" class="t2"/>
    <circle cx="260" cy="80" r="0.9" fill="#c4b5fd" class="t3"/>
    <circle cx="780" cy="340" r="0.7" fill="#fff" class="t1"/>
    <circle cx="320" cy="355" r="0.5" fill="#67e8f9" class="t2"/>
    <circle cx="870" cy="290" r="0.8" fill="#fff" class="t3"/>
    <circle cx="500" cy="70" r="0.6" fill="#c4b5fd" class="t1"/>
    <circle cx="680" cy="310" r="0.7" fill="#fff" class="t2"/>

    <!-- Constellation connections (right side) -->
    <g opacity="0.35">
      <line x1="560" y1="60" x2="650" y2="42" stroke="url(#connGrad)" stroke-width="0.8" class="conn"/>
      <line x1="650" y1="42" x2="740" y2="68" stroke="url(#connGrad)" stroke-width="0.8" class="conn2"/>
      <line x1="740" y1="68" x2="830" y2="52" stroke="url(#connGrad)" stroke-width="0.8" class="conn"/>
      <line x1="560" y1="60" x2="540" y2="130" stroke="url(#connGrad)" stroke-width="0.7" class="conn3"/>
      <line x1="650" y1="42" x2="640" y2="135" stroke="url(#connGrad)" stroke-width="1" class="conn"/>
      <line x1="740" y1="68" x2="750" y2="120" stroke="url(#connGrad)" stroke-width="0.8" class="conn2"/>
      <line x1="830" y1="52" x2="840" y2="105" stroke="url(#connGrad)" stroke-width="0.7" class="conn3"/>
      <line x1="540" y1="130" x2="640" y2="135" stroke="url(#connGrad)" stroke-width="0.9" class="conn"/>
      <line x1="640" y1="135" x2="750" y2="120" stroke="url(#connGrad)" stroke-width="1.1" class="conn2"/>
      <line x1="750" y1="120" x2="840" y2="105" stroke="url(#connGrad)" stroke-width="0.8" class="conn"/>
      <line x1="540" y1="130" x2="570" y2="210" stroke="url(#connGrad)" stroke-width="0.7" class="conn3"/>
      <line x1="640" y1="135" x2="680" y2="215" stroke="url(#connGrad)" stroke-width="1" class="conn"/>
      <line x1="750" y1="120" x2="780" y2="200" stroke="url(#connGrad)" stroke-width="0.8" class="conn2"/>
      <line x1="840" y1="105" x2="860" y2="180" stroke="url(#connGrad)" stroke-width="0.7" class="conn3"/>
      <line x1="570" y1="210" x2="680" y2="215" stroke="url(#connGrad)" stroke-width="0.9" class="conn"/>
      <line x1="680" y1="215" x2="780" y2="200" stroke="url(#connGrad)" stroke-width="1" class="conn2"/>
      <line x1="780" y1="200" x2="860" y2="180" stroke="url(#connGrad)" stroke-width="0.8" class="conn"/>
      <line x1="570" y1="210" x2="610" y2="290" stroke="url(#connGrad)" stroke-width="0.7" class="conn3"/>
      <line x1="680" y1="215" x2="720" y2="280" stroke="url(#connGrad)" stroke-width="0.9" class="conn"/>
      <line x1="780" y1="200" x2="830" y2="265" stroke="url(#connGrad)" stroke-width="0.8" class="conn2"/>
      <line x1="610" y1="290" x2="720" y2="280" stroke="url(#connGrad)" stroke-width="0.8" class="conn"/>
      <line x1="720" y1="280" x2="830" y2="265" stroke="url(#connGrad)" stroke-width="0.9" class="conn3"/>
    </g>

    <!-- Constellation nodes (right side) -->
    <g filter="url(#nodeGlow)">
      <circle cx="560" cy="60" r="3" fill="#7c3aed" class="t1" opacity="0.8"/>
      <circle cx="650" cy="42" r="4" fill="#06b6d4" class="t2" opacity="0.85"/>
      <circle cx="740" cy="68" r="3" fill="#a855f7" class="t3" opacity="0.75"/>
      <circle cx="830" cy="52" r="2.5" fill="#7c3aed" class="t1" opacity="0.7"/>
      <circle cx="540" cy="130" r="3.5" fill="#06b6d4" class="t2" opacity="0.8"/>
      <circle cx="640" cy="135" r="5.5" fill="#7c3aed" class="t3" opacity="0.9" style="animation:nodePulseBig 3s ease-in-out infinite"/>
      <circle cx="750" cy="120" r="3.5" fill="#a855f7" class="t1" opacity="0.8"/>
      <circle cx="840" cy="105" r="2.5" fill="#06b6d4" class="t2" opacity="0.7"/>
      <circle cx="570" cy="210" r="3" fill="#a855f7" class="t3" opacity="0.75"/>
      <circle cx="680" cy="215" r="4.5" fill="#7c3aed" class="t1" opacity="0.85" style="animation:nodePulseBig 3.5s ease-in-out .5s infinite"/>
      <circle cx="780" cy="200" r="3" fill="#06b6d4" class="t2" opacity="0.8"/>
      <circle cx="860" cy="180" r="2.5" fill="#a855f7" class="t3" opacity="0.7"/>
      <circle cx="610" cy="290" r="3" fill="#06b6d4" class="t1" opacity="0.75"/>
      <circle cx="720" cy="280" r="3.5" fill="#7c3aed" class="t2" opacity="0.8"/>
      <circle cx="830" cy="265" r="2.5" fill="#a855f7" class="t3" opacity="0.7"/>
    </g>

    <!-- Top accent line -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="url(#neonLine)" stroke-width="2" opacity="0.7"/>

    <!-- NAME -->
    <text class="nm" x="44" y="125" font-family="'Helvetica Neue','Arial',sans-serif" font-size="46" font-weight="700" fill="#f1f5f9" letter-spacing="4" filter="url(#glow)">QIFAN WU</text>

    <!-- @handle & university -->
    <text class="sub" x="46" y="155" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#64748b" letter-spacing="0.5">@cookiesheep · Sun Yat-sen University</text>

    <!-- Gradient separator -->
    <line class="sep" x1="44" y1="176" x2="480" y2="176" stroke="url(#neonLine)" stroke-width="0.6" opacity="0.5"/>

    <!-- Research tag -->
    <g class="tag">
      <rect x="44" y="194" width="8" height="8" rx="1.5" fill="#7c3aed" opacity="0.8"/>
      <text x="60" y="203" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#06b6d4">Speculative Decoding × PD Separation</text>
    </g>

    <!-- Builder tag -->
    <g class="tag2">
      <rect x="44" y="220" width="8" height="8" rx="1.5" fill="#06b6d4" opacity="0.8"/>
      <text x="60" y="229" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#a855f7">Building AI Developer Tools</text>
    </g>

    <!-- Blinking cursor -->
    <text class="tag3 cur" x="44" y="256" font-family="'Menlo','Consolas','Courier New',monospace" font-size="14" fill="#7c3aed">▌</text>

    <!-- Mini code snippet -->
    <g class="t5" opacity="0.5">
      <rect x="44" y="280" width="230" height="48" rx="6" fill="#0a0a2e" stroke="#1e1b4b" stroke-width="0.5"/>
      <text x="56" y="298" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10" fill="#64748b">
        <tspan fill="#7c3aed">from</tspan> vllm <tspan fill="#7c3aed">import</tspan> LLM
      </text>
      <text x="56" y="316" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10" fill="#64748b">
        model = LLM(<tspan fill="#06b6d4">"Qwen2.5-7B"</tspan>)
      </text>
    </g>

    <!-- Status bar -->
    <g class="st">
      <line x1="44" y1="348" x2="856" y2="348" stroke="#1e293b" stroke-width="0.5"/>
      <circle cx="52" cy="365" r="3" fill="#22c55e" class="sd"/>
      <text x="64" y="369" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#475569">Available for collaboration</text>
      <text x="856" y="369" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#374151" text-anchor="end">Guangzhou, China</text>
    </g>
  </g>

  <!-- Border -->
  <rect width="900" height="380" rx="14" fill="none" stroke="#1e1b4b" stroke-width="1"/>
</svg>