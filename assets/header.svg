    <!-- Equalizer keyframes -->
    <style>
      @keyframes e0{0%,100%{transform:scaleY(1)}50%{transform:scaleY(2.2)}}
      @keyframes e1{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.35)}}
      @keyframes e2{0%,100%{transform:scaleY(.7)}50%{transform:scaleY(1.9)}}
      @keyframes e3{0%,100%{transform:scaleY(1.4)}50%{transform:scaleY(.5)}}
      @keyframes e4{0%,100%{transform:scaleY(.55)}50%{transform:scaleY(2.4)}}
    </style>

    <!-- Research tag -->
    <g class="t1">
      <rect x="48" y="198" width="7" height="7" rx="1.5" fill="#f97316"/>
      <text x="63" y="206" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#fb923c" letter-spacing="0.3">Speculative Decoding × PD Separation Load Balancing</text>
    </g>

    <!-- Builder tag -->
    <g class="t2">
      <rect x="48" y="222" width="7" height="7" rx="1.5" fill="#fbbf24"/>
      <text x="63" y="230" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#8b949e" letter-spacing="0.3">Building AI Developer Tools · Open Source</text>
    </g>

    <!-- Cursor -->
    <text class="cur" x="48" y="256" font-family="'Menlo','Consolas','Courier New',monospace" font-size="14" fill="#f97316">▌</text>

    <!-- Status bar -->
    <g class="st">
      <line x1="48" y1="270" x2="852" y2="270" stroke="#21262d" stroke-width="0.5"/>
      <circle cx="54" cy="286" r="3" fill="#3fb950" class="sd"/>
      <text x="66" y="290" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#484f58">Available for collaboration</text>
