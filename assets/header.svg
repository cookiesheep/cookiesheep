<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#090c10"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="450" cy="155" r="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.07"/>
      <stop offset="40%" stop-color="#f97316" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow2" cx="200" cy="100" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="barGrad" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#fbbf24" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="barGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316">
        <animate attributeName="stop-color" values="#f97316;#fbbf24;#f97316" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#f97316;#fbbf24" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <pattern id="dot" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.35" fill="#f97316"/>
    </pattern>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <clipPath id="c"><rect width="900" height="320" rx="10"/></clipPath>
  </defs>

  <style>
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes blink{0%,48%{opacity:1}50%,98%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.9}50%{opacity:.35}}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(330px)}}
    @keyframes e0{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.9)}}
    @keyframes e1{0%,100%{transform:scaleY(1)}50%{transform:scaleY(.45)}}
    @keyframes e2{0%,100%{transform:scaleY(.7)}50%{transform:scaleY(1.7)}}
    @keyframes e3{0%,100%{transform:scaleY(1.35)}50%{transform:scaleY(.55)}}
    @keyframes e4{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(2.0)}}
    .bar{transform-box:fill-box;transform-origin:bottom center}
    .n{animation:up .7s ease-out .2s both}
    .h{animation:up .5s ease-out .5s both}
    .bars{animation:fi .8s ease-out .3s both}
    .t1{animation:up .5s ease-out 1.2s both}
    .t2{animation:up .5s ease-out 1.4s both}
    .cur{animation:blink 1s step-end 1.8s infinite}
    .st{animation:fi .5s ease-out 1.6s both}
    .sd{animation:pulse 2.5s ease-in-out infinite}
    .scan{animation:scan 6s linear infinite}
  </style>

  <g clip-path="url(#c)">
    <!-- Background layers -->
    <rect width="900" height="320" fill="url(#bg)"/>
    <rect width="900" height="320" fill="url(#warmGlow)"/>
    <rect width="900" height="320" fill="url(#warmGlow2)"/>
    <rect width="900" height="320" fill="url(#dot)" opacity="0.03"/>
    <rect width="900" height="320" filter="url(#noise)" opacity="0.015" fill="#fff"/>

    <!-- Top accent -->
    <rect width="900" height="2" fill="url(#accent)" opacity="0.85"/>

    <!-- Scan line -->
    <rect class="scan" x="0" y="0" width="900" height="1.5" fill="#f97316" opacity="0.04" rx="0.5"/>

    <!-- NAME -->
    <text class="n" x="48" y="88" font-family="'Helvetica Neue','Arial',sans-serif" font-size="44" font-weight="800" fill="#f0f6fc" letter-spacing="2">QIFAN WU</text>

    <!-- Handle -->
    <text class="h" x="50" y="115" font-family="'Menlo','Consolas','Courier New',monospace" font-size="12.5" fill="#8b949e" letter-spacing="0.5">@cookiesheep · Sun Yat-sen University</text>

    <!-- EQUALIZER BARS — bell curve distribution, center tall, edges short -->
    <g class="bars">
      <!-- Glow below bars -->
      <rect x="20" y="168" width="860" height="28" fill="url(#barGlow)" rx="4"/>

      <!-- Bars: 50 bars, spacing=17px, width=6px, bottom at y=168 -->
      <rect class="bar" x="20"  y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e3 1.1s ease-in-out infinite .00s"/>
      <rect class="bar" x="37"  y="159" width="6" height="9"  rx="3" fill="url(#barGrad)" style="animation:e1 1.3s ease-in-out infinite .05s"/>
      <rect class="bar" x="54"  y="157" width="6" height="11" rx="3" fill="url(#barGrad)" style="animation:e4 0.9s ease-in-out infinite .10s"/>
      <rect class="bar" x="71"  y="155" width="6" height="13" rx="3" fill="url(#barGrad)" style="animation:e0 1.0s ease-in-out infinite .15s"/>
      <rect class="bar" x="88"  y="154" width="6" height="14" rx="3" fill="url(#barGrad)" style="animation:e2 1.2s ease-in-out infinite .20s"/>
      <rect class="bar" x="105" y="152" width="6" height="16" rx="3" fill="url(#barGrad)" style="animation:e3 0.8s ease-in-out infinite .25s"/>
      <rect class="bar" x="122" y="150" width="6" height="18" rx="3" fill="url(#barGrad)" style="animation:e1 1.1s ease-in-out infinite .30s"/>
      <rect class="bar" x="139" y="148" width="6" height="20" rx="3" fill="url(#barGrad)" style="animation:e4 1.3s ease-in-out infinite .35s"/>
      <rect class="bar" x="156" y="146" width="6" height="22" rx="3" fill="url(#barGrad)" style="animation:e0 0.9s ease-in-out infinite .40s"/>
      <rect class="bar" x="173" y="144" width="6" height="24" rx="3" fill="url(#barGrad)" style="animation:e2 1.0s ease-in-out infinite .45s"/>
      <rect class="bar" x="190" y="142" width="6" height="26" rx="3" fill="url(#barGrad)" style="animation:e3 1.2s ease-in-out infinite .50s"/>
      <rect class="bar" x="207" y="141" width="6" height="27" rx="3" fill="url(#barGrad)" style="animation:e1 0.8s ease-in-out infinite .55s"/>
      <rect class="bar" x="224" y="140" width="6" height="28" rx="3" fill="url(#barGrad)" style="animation:e4 1.1s ease-in-out infinite .60s"/>
      <rect class="bar" x="241" y="140" width="6" height="28" rx="3" fill="url(#barGrad)" style="animation:e0 1.3s ease-in-out infinite .65s"/>
      <rect class="bar" x="258" y="141" width="6" height="27" rx="3" fill="url(#barGrad)" style="animation:e2 0.9s ease-in-out infinite .70s"/>
      <rect class="bar" x="275" y="142" width="6" height="26" rx="3" fill="url(#barGrad)" style="animation:e3 1.0s ease-in-out infinite .75s"/>
      <rect class="bar" x="292" y="144" width="6" height="24" rx="3" fill="url(#barGrad)" style="animation:e1 1.2s ease-in-out infinite .80s"/>
      <rect class="bar" x="309" y="146" width="6" height="22" rx="3" fill="url(#barGrad)" style="animation:e4 0.8s ease-in-out infinite .85s"/>
      <rect class="bar" x="326" y="148" width="6" height="20" rx="3" fill="url(#barGrad)" style="animation:e0 1.1s ease-in-out infinite .90s"/>
      <rect class="bar" x="343" y="150" width="6" height="18" rx="3" fill="url(#barGrad)" style="animation:e2 1.3s ease-in-out infinite .95s"/>
      <rect class="bar" x="360" y="152" width="6" height="16" rx="3" fill="url(#barGrad)" style="animation:e3 0.9s ease-in-out infinite 1.00s"/>
      <rect class="bar" x="377" y="155" width="6" height="13" rx="3" fill="url(#barGrad)" style="animation:e1 1.0s ease-in-out infinite 1.05s"/>
      <rect class="bar" x="394" y="157" width="6" height="11" rx="3" fill="url(#barGrad)" style="animation:e4 1.2s ease-in-out infinite 1.10s"/>
      <rect class="bar" x="411" y="155" width="6" height="13" rx="3" fill="url(#barGrad)" style="animation:e0 0.8s ease-in-out infinite 1.15s"/>
      <rect class="bar" x="428" y="153" width="6" height="15" rx="3" fill="url(#barGrad)" style="animation:e2 1.1s ease-in-out infinite 1.20s"/>
      <rect class="bar" x="445" y="150" width="6" height="18" rx="3" fill="url(#barGrad)" style="animation:e3 1.3s ease-in-out infinite 1.25s"/>
      <rect class="bar" x="462" y="147" width="6" height="21" rx="3" fill="url(#barGrad)" style="animation:e1 0.9s ease-in-out infinite 1.30s"/>
      <rect class="bar" x="479" y="144" width="6" height="24" rx="3" fill="url(#barGrad)" style="animation:e4 1.0s ease-in-out infinite 1.35s"/>
      <rect class="bar" x="496" y="141" width="6" height="27" rx="3" fill="url(#barGrad)" style="animation:e0 1.2s ease-in-out infinite 1.40s"/>
      <rect class="bar" x="513" y="140" width="6" height="28" rx="3" fill="url(#barGrad)" style="animation:e2 0.8s ease-in-out infinite 1.45s"/>
