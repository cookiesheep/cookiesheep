<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 310" width="900" height="310">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="310" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0e27"/>
      <stop offset="40%" stop-color="#12082b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#7c3aed" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#06b6d4">
        <animate attributeName="stop-color" values="#06b6d4;#a855f7;#06b6d4" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#7c3aed">
        <animate attributeName="stop-color" values="#7c3aed;#06b6d4;#7c3aed" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="nameGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="0.5" fill="#7c3aed"/>
    </pattern>
    <clipPath id="roundClip"><rect width="900" height="310" rx="12"/></clipPath>
  </defs>

  <style>
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    @keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes blink{0%,48%{opacity:1}50%,98%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    @keyframes draw{from{stroke-dashoffset:840}to{stroke-dashoffset:0}}
    @keyframes shimmer{0%{stop-opacity:.08}50%{stop-opacity:.15}100%{stop-opacity:.08}}
    .c{animation:fadeIn .4s ease-out both}
    .p1{animation:slideUp .5s ease-out .3s both}
    .nm{animation:slideUp .7s ease-out .6s both}
    .sub{animation:slideUp .5s ease-out .9s both}
    .sep{animation:draw .8s ease-out 1.1s both;stroke-dasharray:840}
    .p2{animation:slideUp .5s ease-out 1.3s both}
    .fc{animation:slideUp .5s ease-out 1.6s both}
    .cur{animation:blink 1s step-end 2s infinite}
    .st{animation:fadeIn .5s ease-out 2s both}
    .sd{animation:pulse 2.5s ease-in-out infinite}
    .bk{animation:fadeIn .6s ease-out .1s both}
    .glow-line{animation:shimmer 3s ease-in-out infinite}
  </style>

  <g clip-path="url(#roundClip)">
    <!-- Background -->
    <rect width="900" height="310" fill="url(#bg)"/>
    <!-- Dot grid -->
    <rect width="900" height="310" fill="url(#grid)" opacity="0.06" class="c"/>
    <!-- Subtle radial glow behind name area -->
    <ellipse cx="240" cy="118" rx="320" ry="60" fill="url(#nameGlow)" class="nm"/>

    <!-- Top decorative line -->
    <line x1="0" y1="0" x2="900" y2="0" stroke="url(#accent)" stroke-width="2" opacity="0.6"/>

    <!-- Terminal chrome -->
    <g class="c">
      <circle cx="26" cy="28" r="6" fill="#ff5f57" opacity="0.9"/>
      <circle cx="48" cy="28" r="6" fill="#febc2e" opacity="0.9"/>
      <circle cx="70" cy="28" r="6" fill="#28c840" opacity="0.9"/>
      <text x="88" y="33" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="10.5" fill="#4a5568" letter-spacing="0.5">cookiesheep — bash — 900×310</text>
    </g>

    <!-- Corner brackets -->
    <g class="bk" stroke="#7c3aed" stroke-width="1.2" fill="none" opacity="0.25">
      <polyline points="14,52 14,14 52,14"/>
      <polyline points="848,296 886,296 886,258"/>
    </g>

    <!-- $ whoami -->
    <g class="p1">
      <text x="38" y="80" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="13.5" fill="#7c3aed">$</text>
      <text x="52" y="80" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="13.5" fill="#94a3b8"> whoami</text>
    </g>

    <!-- Name -->
    <text class="nm" x="38" y="126" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="38" font-weight="bold" fill="#e2e8f0" letter-spacing="5" filter="url(#glow)">QIFAN WU</text>

    <!-- Subtitle -->
    <text class="sub" x="40" y="152" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="13.5" fill="#94a3b8" letter-spacing="0.3">MLSys Research · AI Tools Builder · @SYSU</text>

    <!-- Gradient separator -->
    <line class="sep" x1="38" y1="174" x2="862" y2="174" stroke="url(#accent)" stroke-width="0.6" opacity="0.35"/>

    <!-- $ cat focus.txt -->
    <g class="p2">
      <text x="38" y="200" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="12.5" fill="#7c3aed" opacity="0.7">$</text>
      <text x="50" y="200" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="12.5" fill="#64748b"> cat focus.txt</text>
    </g>

    <!-- Focus text with cyan accent -->
    <text class="fc" x="38" y="228" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="15" fill="#06b6d4" filter="url(#softGlow)" opacity="0.95">Speculative Decoding × PD Separation Load Balancing</text>

    <!-- Blinking cursor -->
    <text class="cur" x="38" y="254" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="15" fill="#7c3aed">▌</text>

    <!-- Bottom status bar -->
    <g class="st">
      <line x1="38" y1="270" x2="862" y2="270" stroke="#1e293b" stroke-width="0.5"/>
      <circle cx="46" cy="288" r="3.5" fill="#22c55e" class="sd"/>
      <text x="58" y="292" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="10.5" fill="#64748b">Available for collaboration</text>
      <text x="862" y="292" font-family="'SF Mono','Fira Code','Consolas','Courier New',monospace" font-size="10.5" fill="#475569" text-anchor="end">Guangzhou, China</text>
    </g>
  </g>

  <!-- Border -->
  <rect width="900" height="310" rx="12" fill="none" stroke="#1e293b" stroke-width="1"/>
</svg>