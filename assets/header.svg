      <rect class="bar" x="615" y="155" width="6" height="13" rx="3" fill="url(#barGrad)" style="animation:e3 0.8s ease-in-out infinite 1.75s"/>
      <rect class="bar" x="632" y="157" width="6" height="11" rx="3" fill="url(#barGrad)" style="animation:e1 1.1s ease-in-out infinite 1.80s"/>
      <rect class="bar" x="649" y="158" width="6" height="10" rx="3" fill="url(#barGrad)" style="animation:e4 1.3s ease-in-out infinite 1.85s"/>
      <rect class="bar" x="666" y="159" width="6" height="9"  rx="3" fill="url(#barGrad)" style="animation:e0 0.9s ease-in-out infinite 1.90s"/>
      <rect class="bar" x="683" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e2 1.0s ease-in-out infinite 1.95s"/>
      <rect class="bar" x="700" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e3 1.2s ease-in-out infinite 2.00s"/>
      <rect class="bar" x="717" y="161" width="6" height="7"  rx="3" fill="url(#barGrad)" style="animation:e1 0.8s ease-in-out infinite 2.05s"/>
      <rect class="bar" x="734" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e4 1.1s ease-in-out infinite 2.10s"/>
      <rect class="bar" x="751" y="161" width="6" height="7"  rx="3" fill="url(#barGrad)" style="animation:e0 1.3s ease-in-out infinite 2.15s"/>
      <rect class="bar" x="768" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e2 0.9s ease-in-out infinite 2.20s"/>
      <rect class="bar" x="785" y="161" width="6" height="7"  rx="3" fill="url(#barGrad)" style="animation:e3 1.0s ease-in-out infinite 2.25s"/>
      <rect class="bar" x="802" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e1 1.2s ease-in-out infinite 2.30s"/>
      <rect class="bar" x="819" y="161" width="6" height="7"  rx="3" fill="url(#barGrad)" style="animation:e4 0.8s ease-in-out infinite 2.35s"/>
      <rect class="bar" x="836" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e0 1.1s ease-in-out infinite 2.40s"/>
      <rect class="bar" x="853" y="161" width="6" height="7"  rx="3" fill="url(#barGrad)" style="animation:e2 1.3s ease-in-out infinite 2.45s"/>
      <rect class="bar" x="870" y="160" width="6" height="8"  rx="3" fill="url(#barGrad)" style="animation:e3 0.9s ease-in-out infinite 2.50s"/>
    </g>

    <!-- Tags -->
    <g class="t1">
      <rect x="48" y="206" width="7" height="7" rx="1.5" fill="#f97316"/>
      <text x="63" y="214" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#fb923c">Speculative Decoding × PD Separation Load Balancing</text>
    </g>
    <g class="t2">
      <rect x="48" y="228" width="7" height="7" rx="1.5" fill="#fbbf24"/>
      <text x="63" y="236" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#8b949e">Building AI Developer Tools · Open Source</text>
    </g>
    <text class="cur" x="48" y="260" font-family="'Menlo','Consolas','Courier New',monospace" font-size="14" fill="#f97316">▌</text>

    <!-- Status -->
    <g class="st">
      <line x1="48" y1="278" x2="852" y2="278" stroke="#21262d" stroke-width="0.5"/>
      <circle cx="54" cy="296" r="3" fill="#3fb950" class="sd"/>
      <text x="66" y="300" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#484f58">Available for collaboration</text>
      <text x="852" y="300" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#30363d" text-anchor="end">Guangzhou, China</text>
    </g>
  </g>

  <rect width="900" height="320" rx="10" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>