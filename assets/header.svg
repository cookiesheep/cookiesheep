<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0A0F14"/>
      <stop offset="100%" stop-color="#070B0E"/>
    </linearGradient>
    <radialGradient id="g1" cx="280" cy="140" r="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5A0" stop-opacity="0.06"/>
      <stop offset="40%" stop-color="#00E5A0" stop-opacity="0.02"/>
      <stop offset="100%" stop-color="#00E5A0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="700" cy="200" r="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D9488" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#0D9488" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g3" cx="450" cy="160" r="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FCD34D" stop-opacity="0.015"/>
      <stop offset="100%" stop-color="#FCD34D" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00E5A0">
        <animate attributeName="stop-color" values="#00E5A0;#5EEAD4;#0D9488;#00E5A0" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#0D9488">
        <animate attributeName="stop-color" values="#0D9488;#00E5A0;#5EEAD4;#0D9488" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="3" stitchTiles="stitch"/>
    </filter>
    <pattern id="dot" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="0.3" fill="#00E5A0" opacity="0.5"/>
    </pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="c"><rect width="900" height="320" rx="10"/></clipPath>
  </defs>

  <style>
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes blink{0%,48%{opacity:1}50%,98%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.9}50%{opacity:.35}}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(330px)}}
    @keyframes fl{from{stroke-dashoffset:50}to{stroke-dashoffset:0}}
    @keyframes flR{from{stroke-dashoffset:0}to{stroke-dashoffset:50}}
    @keyframes d0{0%,100%{transform:translate(0,0)}25%{transform:translate(2px,-5px)}50%{transform:translate(-1px,-8px)}75%{transform:translate(3px,-3px)}}
    @keyframes d1{0%,100%{transform:translate(0,0)}33%{transform:translate(-3px,-6px)}66%{transform:translate(2px,-10px)}}
    @keyframes d2{0%,100%{transform:translate(0,0)}25%{transform:translate(-2px,4px)}50%{transform:translate(3px,-3px)}75%{transform:translate(-1px,-7px)}}
    @keyframes d3{0%,100%{transform:translate(0,0)}20%{transform:translate(4px,-2px)}60%{transform:translate(-3px,-9px)}80%{transform:translate(1px,3px)}}
    @keyframes d4{0%,100%{transform:translate(0,0)}50%{transform:translate(-2px,-12px)}}
    @keyframes d5{0%,100%{transform:translate(0,0)}30%{transform:translate(5px,-4px)}70%{transform:translate(-4px,-8px)}}
    .n{animation:up .7s ease-out .2s both}
    .h{animation:up .5s ease-out .5s both}
    .pts{animation:fi 1s ease-out .3s both}
    .fls{animation:fi .8s ease-out .1s both}
    .t1{animation:up .5s ease-out 1.2s both}
    .t2{animation:up .5s ease-out 1.4s both}
    .cur{animation:blink 1s step-end 1.8s infinite}
    .st{animation:fi .5s ease-out 1.6s both}
    .sd{animation:pulse 2.5s ease-in-out infinite}
    .sc{animation:scan 6s linear infinite}
    .p{transform-box:fill-box;transform-origin:center}
  </style>

  <g clip-path="url(#c)">
    <!-- Layer 1: Atmosphere -->
    <rect width="900" height="320" fill="url(#bg)"/>
    <rect width="900" height="320" fill="url(#g1)"/>
    <rect width="900" height="320" fill="url(#g2)"/>
    <rect width="900" height="320" fill="url(#g3)"/>
    <rect width="900" height="320" fill="url(#dot)" opacity="0.025"/>
    <rect width="900" height="320" filter="url(#noise)" opacity="0.015" fill="#fff"/>
    <rect width="900" height="2" fill="url(#accent)" opacity="0.85"/>
    <rect class="sc" x="0" y="0" width="900" height="1.5" fill="#00E5A0" opacity="0.03" rx="0.5"/>

    <!-- Layer 2: Flow Lines -->
    <g class="fls">
      <path d="M-10,148 Q110,130 220,150 T450,142 T680,155 T910,145" fill="none" stroke="#00E5A0" stroke-width="1" opacity="0.15" stroke-dasharray="3 47" style="animation:fl 3s linear infinite"/>
      <path d="M-10,162 Q130,180 260,158 T520,168 T760,155 T910,165" fill="none" stroke="#5EEAD4" stroke-width="0.8" opacity="0.1" stroke-dasharray="2 48" style="animation:flR 4s linear infinite .5s"/>
      <path d="M-10,175 Q160,190 310,170 T560,180 T810,168 T910,178" fill="none" stroke="#0D9488" stroke-width="1.2" opacity="0.12" stroke-dasharray="4 46" style="animation:fl 5s linear infinite 1s"/>
      <path d="M-10,138 Q100,120 210,140 T430,132 T660,142 T910,135" fill="none" stroke="#00E5A0" stroke-width="0.6" opacity="0.08" stroke-dasharray="2 48" style="animation:flR 3.5s linear infinite 1.5s"/>
      <path d="M-10,155 C200,130 400,175 550,150 S750,130 910,158" fill="none" stroke="#5EEAD4" stroke-width="1.5" opacity="0.06" stroke-dasharray="5 45" style="animation:fl 6s linear infinite 2s"/>
    </g>

    <!-- Layer 3: Particle Field -->
    <g class="pts">
      <!-- BACK LAYER: 20 particles, 2-2.5px, opacity 0.1-0.22, slow 8-12s -->
      <rect class="p" x="45" y="30" width="2" height="2" rx=".5" fill="#00E5A0" opacity=".15" style="animation:d0 11s ease-in-out infinite .2s"/>
      <rect class="p" x="120" y="175" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".2" style="animation:d1 9s ease-in-out infinite .5s"/>
      <rect class="p" x="185" y="52" width="2.5" height="2.5" rx=".5" fill="#0D9488" opacity=".12" style="animation:d2 10s ease-in-out infinite .8s"/>
      <rect class="p" x="258" y="288" width="2" height="2" rx=".5" fill="#00E5A0" opacity=".18" style="animation:d3 12s ease-in-out infinite .1s"/>
      <rect class="p" x="315" y="115" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".15" style="animation:d4 8s ease-in-out infinite 1.2s"/>
      <rect class="p" x="388" y="248" width="2.5" height="2.5" rx=".5" fill="#0D9488" opacity=".22" style="animation:d5 11s ease-in-out infinite .3s"/>
      <rect class="p" x="425" y="38" width="2" height="2" rx=".5" fill="#00E5A0" opacity=".13" style="animation:d0 10s ease-in-out infinite .7s"/>
      <rect class="p" x="505" y="192" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".2" style="animation:d1 9s ease-in-out infinite 1.5s"/>
      <rect class="p" x="565" y="305" width="2" height="2" rx=".5" fill="#0D9488" opacity=".16" style="animation:d2 12s ease-in-out infinite .4s"/>
      <rect class="p" x="625" y="78" width="2.5" height="2.5" rx=".5" fill="#00E5A0" opacity=".14" style="animation:d3 8s ease-in-out infinite .9s"/>
      <rect class="p" x="685" y="228" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".19" style="animation:d4 11s ease-in-out infinite 1.1s"/>
      <rect class="p" x="735" y="48" width="2" height="2" rx=".5" fill="#0D9488" opacity=".15" style="animation:d5 10s ease-in-out infinite .6s"/>
      <rect class="p" x="785" y="168" width="2" height="2" rx=".5" fill="#00E5A0" opacity=".21" style="animation:d0 9s ease-in-out infinite 1.3s"/>
      <rect class="p" x="835" y="278" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".17" style="animation:d1 12s ease-in-out infinite .2s"/>
      <rect class="p" x="872" y="88" width="2.5" height="2.5" rx=".5" fill="#0D9488" opacity=".13" style="animation:d2 8s ease-in-out infinite .8s"/>
      <rect class="p" x="72" y="258" width="2" height="2" rx=".5" fill="#00E5A0" opacity=".18" style="animation:d3 10s ease-in-out infinite 1s"/>
      <rect class="p" x="165" y="138" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".16" style="animation:d4 11s ease-in-out infinite .5s"/>
      <rect class="p" x="462" y="68" width="2" height="2" rx=".5" fill="#0D9488" opacity=".14" style="animation:d5 9s ease-in-out infinite .3s"/>
      <rect class="p" x="555" y="288" width="2.5" height="2.5" rx=".5" fill="#00E5A0" opacity=".2" style="animation:d0 12s ease-in-out infinite .7s"/>
      <rect class="p" x="705" y="148" width="2" height="2" rx=".5" fill="#5EEAD4" opacity=".15" style="animation:d1 10s ease-in-out infinite 1.4s"/>

      <!-- MID LAYER: 18 particles, 3-3.5px, opacity 0.3-0.45, medium 5.5-7s -->
      <rect class="p" x="82" y="128" width="3" height="3" rx=".5" fill="#5EEAD4" opacity=".35" style="animation:d2 7s ease-in-out infinite .3s"/>
      <rect class="p" x="155" y="268" width="3.5" height="3.5" rx=".5" fill="#0D9488" opacity=".4" style="animation:d3 6s ease-in-out infinite .6s"/>
      <rect class="p" x="215" y="75" width="3" height="3" rx=".5" fill="#00E5A0" opacity=".32" style="animation:d4 7s ease-in-out infinite .9s"/>
      <rect class="p" x="285" y="198" width="3" height="3" rx=".5" fill="#5EEAD4" opacity=".45" style="animation:d5 5.5s ease-in-out infinite .2s"/>
      <rect class="p" x="345" y="48" width="3.5" height="3.5" rx=".5" fill="#00E5A0" opacity=".38" style="animation:d0 6.5s ease-in-out infinite 1.1s"/>
      <rect class="p" x="405" y="275" width="3" height="3" rx=".5" fill="#0D9488" opacity=".42" style="animation:d1 7s ease-in-out infinite .4s"/>
      <rect class="p" x="465" y="155" width="3.5" height="3.5" rx=".5" fill="#5EEAD4" opacity=".35" style="animation:d2 5.5s ease-in-out infinite .7s"/>
      <rect class="p" x="525" y="38" width="3" height="3" rx=".5" fill="#00E5A0" opacity=".3" style="animation:d3 6s ease-in-out infinite 1.3s"/>
      <rect class="p" x="575" y="238" width="3" height="3" rx=".5" fill="#0D9488" opacity=".4" style="animation:d4 7s ease-in-out infinite .5s"/>
      <rect class="p" x="635" y="105" width="3.5" height="3.5" rx=".5" fill="#5EEAD4" opacity=".43" style="animation:d5 5.5s ease-in-out infinite .8s"/>
      <rect class="p" x="695" y="298" width="3" height="3" rx=".5" fill="#00E5A0" opacity=".37" style="animation:d0 6.5s ease-in-out infinite 1s"/>
      <rect class="p" x="745" y="188" width="3" height="3" rx=".5" fill="#0D9488" opacity=".33" style="animation:d1 7s ease-in-out infinite .3s"/>
      <rect class="p" x="805" y="58" width="3.5" height="3.5" rx=".5" fill="#5EEAD4" opacity=".41" style="animation:d2 5.5s ease-in-out infinite 1.2s"/>
      <rect class="p" x="855" y="245" width="3" height="3" rx=".5" fill="#00E5A0" opacity=".36" style="animation:d3 6s ease-in-out infinite .6s"/>
      <rect class="p" x="105" y="48" width="3" height="3" rx=".5" fill="#0D9488" opacity=".34" style="animation:d4 7s ease-in-out infinite .9s"/>
      <rect class="p" x="335" y="168" width="3.5" height="3.5" rx=".5" fill="#5EEAD4" opacity=".44" style="animation:d5 5.5s ease-in-out infinite .4s"/>
      <rect class="p" x="485" y="298" width="3" height="3" rx=".5" fill="#00E5A0" opacity=".39" style="animation:d0 6.5s ease-in-out infinite 1.1s"/>
      <rect class="p" x="605" y="168" width="3" height="3" rx=".5" fill="#0D9488" opacity=".31" style="animation:d1 7s ease-in-out infinite .2s"/>

      <!-- FRONT LAYER: 12 particles, 4-5px, opacity 0.55-0.85, fast 3-4.5s -->
      <!-- 4 particles with glow filter -->
      <rect class="p" x="112" y="92" width="4" height="4" rx="1" fill="#00E5A0" opacity=".6" filter="url(#glow)" style="animation:d4 4s ease-in-out infinite .5s"/>
      <rect class="p" x="365" y="258" width="5" height="5" rx="1" fill="#00E5A0" opacity=".75" filter="url(#glow)" style="animation:d1 3s ease-in-out infinite .3s"/>
      <rect class="p" x="595" y="278" width="5" height="5" rx="1" fill="#00E5A0" opacity=".72" filter="url(#glow)" style="animation:d4 3.5s ease-in-out infinite .4s"/>
      <rect class="p" x="855" y="108" width="4.5" height="4.5" rx="1" fill="#5EEAD4" opacity=".6" filter="url(#glow)" style="animation:d2 4s ease-in-out infinite 1.2s"/>
      <!-- 8 particles without glow -->
      <rect class="p" x="205" y="218" width="5" height="5" rx="1" fill="#5EEAD4" opacity=".7" style="animation:d5 3.5s ease-in-out infinite .2s"/>
      <rect class="p" x="275" y="55" width="4" height="4" rx="1" fill="#0D9488" opacity=".55" style="animation:d0 4.5s ease-in-out infinite .8s"/>
      <rect class="p" x="445" y="128" width="4.5" height="4.5" rx="1" fill="#5EEAD4" opacity=".65" style="animation:d2 4s ease-in-out infinite 1s"/>
      <rect class="p" x="535" y="48" width="4" height="4" rx="1" fill="#0D9488" opacity=".58" style="animation:d3 4.5s ease-in-out infinite .6s"/>
      <rect class="p" x="665" y="158" width="4.5" height="4.5" rx="1" fill="#5EEAD4" opacity=".62" style="animation:d5 4s ease-in-out infinite .9s"/>
      <rect class="p" x="725" y="35" width="4" height="4" rx="1" fill="#0D9488" opacity=".55" style="animation:d0 4.5s ease-in-out infinite .1s"/>
      <rect class="p" x="795" y="228" width="5" height="5" rx="1" fill="#00E5A0" opacity=".78" style="animation:d1 3s ease-in-out infinite .7s"/>
      <rect class="p" x="155" y="298" width="4" height="4" rx="1" fill="#0D9488" opacity=".56" style="animation:d3 4.5s ease-in-out infinite .3s"/>
    </g>

    <!-- Layer 4: Content -->
    <text class="n" x="48" y="88" font-family="'Helvetica Neue','Arial',sans-serif" font-size="44" font-weight="800" fill="#F0F6FC" letter-spacing="2">QIFAN WU</text>
    <text class="h" x="50" y="115" font-family="'Menlo','Consolas','Courier New',monospace" font-size="12.5" fill="#8b949e" letter-spacing=".5">@cookiesheep · Sun Yat-sen University</text>

    <g class="t1">
      <rect x="48" y="206" width="7" height="7" rx="1.5" fill="#00E5A0"/>
      <text x="63" y="214" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#5EEAD4">Speculative Decoding × PD Separation Load Balancing</text>
    </g>
    <g class="t2">
      <rect x="48" y="228" width="7" height="7" rx="1.5" fill="#FCD34D"/>
      <text x="63" y="236" font-family="'Menlo','Consolas','Courier New',monospace" font-size="13" fill="#8b949e">Building AI Developer Tools · Open Source</text>
    </g>
    <text class="cur" x="48" y="260" font-family="'Menlo','Consolas','Courier New',monospace" font-size="14" fill="#00E5A0">▌</text>

    <g class="st">
      <line x1="48" y1="278" x2="852" y2="278" stroke="#21262d" stroke-width=".5"/>
      <circle cx="54" cy="296" r="3" fill="#00E5A0" class="sd"/>
      <text x="66" y="300" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#484f58">Available for collaboration</text>
      <text x="852" y="300" font-family="'Menlo','Consolas','Courier New',monospace" font-size="10.5" fill="#30363d" text-anchor="end">Guangzhou, China</text>
    </g>
  </g>

  <rect width="900" height="320" rx="10" fill="none" stroke="#21262d" stroke-width="1"/>
</svg>
