<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="warmBar" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316">
        <animate attributeName="stop-color" values="#f97316;#fbbf24;#f97316" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#fbbf24">
        <animate attributeName="stop-color" values="#fbbf24;#f97316;#fbbf24" dur="8s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#0a0d12"/>
    </linearGradient>
    <pattern id="dot" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.4" fill="#f97316"/>
    </pattern>
    <clipPath id="c"><rect width="900" height="300" rx="10"/></clipPath>
  </defs>

  <style>
    @keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fi{from{opacity:0}to{opacity:1}}
    @keyframes blink{0%,48%{opacity:1}50%,98%{opacity:0}100%{opacity:1}}
    @keyframes pulse{0%,100%{opacity:.9}50%{opacity:.35}}
    @keyframes scan{0%{transform:translateY(-10px)}100%{transform:translateY(310px)}}
    .n{animation:up .7s ease-out .2s both}
    .h{animation:up .5s ease-out .5s both}
    .t1{animation:up .5s ease-out 1.2s both}
    .t2{animation:up .5s ease-out 1.4s both}
    .cur{animation:blink 1s step-end 1.8s infinite}
    .st{animation:fi .5s ease-out 1.6s both}
    .sd{animation:pulse 2.5s ease-in-out infinite}
    .bar{transform-box:fill-box;transform-origin:bottom center}
    .scanline{animation:scan 5s linear infinite}
  </style>

  <g clip-path="url(#c)">
    <!-- Background -->
    <rect width="900" height="300" fill="url(#bg)"/>
    <rect width="900" height="300" fill="url(#dot)" opacity="0.035"/>

    <!-- Top accent line -->
    <rect width="900" height="2" fill="url(#accent)" opacity="0.8"/>

    <!-- Scanning line (very subtle) -->
    <rect class="scanline" x="0" y="0" width="900" height="1" fill="#f97316" opacity="0.06" rx="0.5"/>

    <!-- NAME -->
    <text class="n" x="48" y="88" font-family="'Helvetica Neue','Arial',sans-serif" font-size="44" font-weight="800" fill="#f0f6fc" letter-spacing="2">QIFAN WU</text>

    <!-- Handle + University -->
    <text class="h" x="50" y="116" font-family="'Menlo','Consolas','Courier New',monospace" font-size="12.5" fill="#8b949e" letter-spacing="0.5">@cookiesheep · Sun Yat-sen University</text>

    <!-- EQUALIZER BARS -->
    <g class="bar" opacity="0.75">
      <rect x="24"  y="152" width="5" height="16" rx="2" fill="#f97316" style="animation:e0 1.0s ease-in-out infinite .00s"/>
      <rect x="40"  y="148" width="5" height="20" rx="2" fill="#f97316" style="animation:e1 1.2s ease-in-out infinite .04s"/>
