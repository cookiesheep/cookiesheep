name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#00E5A0&color_dots=#0A0F14,#0D2818,#0D5030,#0D9488,#00E5A0
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#5EEAD4&color_dots=#0A0F14,#0D2818,#0D5030,#0D9488,#5EEAD4

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}