name: Generate Snake
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=#7c3aed&color_dots=#0a0a2e,#1e1060,#3b1f96,#5b30c0,#7c3aed
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#a855f7&color_dots=#0a0a2e,#1e1060,#3b1f96,#5b30c0,#a855f7

      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}